name: Daily Repo Update

on:
  schedule:
    - cron: '7 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Update file - 23f2003821@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f2003821@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update" || echo "No changes to commit"
          git push origin main
