name: Daily Repo Update

on:
  schedule:
    - cron: '7 4 * * *'   # Runs daily at 04:07 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update file - 23f2003821@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f2003821@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update" || echo "No changes to commit"
          git push
